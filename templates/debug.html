<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL DB Debug</title>
    <link rel="icon" href="/static/icons/ush512.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/main.css">

    <style>


        .container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 800px;
        }

        h2 {
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
            font-weight: 400;
            text-align: center;
        }

        textarea {
            padding: 1rem 1.5rem;
            border-radius: 1.25rem;
            font-size: 1.1rem;
            width: 100%;
            border: 0.125rem solid var(--border-color);
            outline: none;
            font-family: monospace;
            resize: vertical;
            min-height: 150px;
            transition: border-color 0.2s ease;
            background: var(--panel-bg);
        }

        textarea:focus {
            filter: brightness(110%);
        }

        #output {
            min-height: 200px;
        }

        button {
            background: var(--panel-bg);
            padding: 1rem 1.5rem;
            border-radius: 1.25rem;
            font-size: 1.2rem;
            border: 0.125rem solid var(--border-color);
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s ease, border 0.2s ease;
            font-weight: 500;
        }

        button:hover {
            background-color: rgba(0, 0, 0, 0.082);
        }

        button:active {
            background-color: rgba(0, 0, 0, 0.02);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>SQL Database Debug</h2>
        
        <textarea id="query" placeholder="SQL query..."></textarea>
        
        <button id="execute-btn" onclick="executeDebug()">Execute Query</button>
        
        <h2>Output</h2>
        <textarea id="output" readonly placeholder="Result..."></textarea>
    </div>

    <script>
        function executeDebug() {
            const queryField = document.getElementById('query');
            const outputField = document.getElementById('output');
            const btn = document.getElementById('execute-btn');
            
            const query = queryField.value;
            
            if (!query.trim()) {
                outputField.value = "Empty query...";
                return;
            }

            btn.disabled = true;
            outputField.value = "Executing...";

            fetch("/-/api/sql-debug/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ query: query })
            })
            .then(response => {
                if (response.ok) {
                    return response.text();
                }
                throw new Error("Error: " + response.status);
            })
            .then(data => {
                outputField.value = typeof data === 'object' ? JSON.stringify(data, null, 2) : data;
            })
            .catch(error => {
                outputField.value = "Error: " + error.message;
            })
            .finally(() => {
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
